name: Delete old workflow runs
on:
  workflow_dispatch:
    inputs:
      days:
        description: '保留每个工作流的运行天数'
        required: true
        default: '30'
      minimum_runs:
        description: '每个工作流最少保留的运行次数'
        required: true
        default: '6'
      delete_workflow_pattern:
        description: '工作流名称或文件名（留空则针对所有工作流）'
        required: false
      delete_workflow_by_state_pattern:
        description: '按工作流状态过滤：active, deleted, disabled_fork, disabled_inactivity, disabled_manually'
        required: true
        default: "ALL"
        type: choice
        options:
          - "ALL"
          - active
          - deleted
          - disabled_inactivity
          - disabled_manually
      delete_run_by_conclusion_pattern:
        description: '按运行结论过滤：action_required, cancelled, failure, skipped, success'
        required: true
        default: "Unsuccessful: action_required,cancelled,failure,skipped"
        type: choice
        options:
          - "ALL"
          - "Unsuccessful: action_required,cancelled,failure,skipped"
          - action_required
          - cancelled
          - failure
          - skipped
          - success
      dry_run:
        description: '预览模式（只显示会删除什么，不真正删除）'
        required: false
        type: boolean
        default: true

jobs:
  del_runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: ${{ github.event.inputs.days }}
          keep_minimum_runs: ${{ github.event.inputs.minimum_runs }}
          delete_workflow_pattern: ${{ github.event.inputs.delete_workflow_pattern }}
          delete_workflow_by_state_pattern: ${{ github.event.inputs.delete_workflow_by_state_pattern }}
          delete_run_by_conclusion_pattern: >-
            ${{
              startsWith(github.event.inputs.delete_run_by_conclusion_pattern, 'Unsuccessful:')
              && 'action_required,cancelled,failure,skipped'
              || github.event.inputs.delete_run_by_conclusion_pattern
            }}
          dry_run: ${{ github.event.inputs.dry_run }}
