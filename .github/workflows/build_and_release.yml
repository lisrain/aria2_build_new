name: "Build and Release"

on:
  push:
    branches:
      - "*"
    paths:
      - 'build.sh'
      - '.github/workflows/build_and_release.yml'
      - 'patch/**'
  pull_request:
    branches:
      - "*"
    paths:
      - 'build.sh'
      - '.github/workflows/build_and_release.yml'
      - 'patch/**'
  schedule:
    - cron: "0 0 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-prerelease:
    name: Create Prerelease
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set current date as env variable
        run: echo "NOW=$(date --utc)" >> $GITHUB_ENV
      - name: Delete Old Release
        run: gh release delete v1.37.0 --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - name: Create Prerelease
        run: |
          gh release create v1.37.0 \
            -p \
            -t 'Aria2 v1.37.0' \
            --notes "Building time: ${NOW}
            - - -
            "
          gh release edit v1.37.0 --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  static-build-linux:
    needs: create-prerelease
    runs-on: ubuntu-latest
    container: "ghcr.io/abcfy2/clang-cross-toolchain-ubuntu:${{ matrix.cross_host }}"
    strategy:
      fail-fast: false
      matrix:
        cross_host:
          - arm-unknown-linux-musleabi
          - armv7-unknown-linux-musleabihf
          - aarch64-unknown-linux-musl
          - loongarch64-unknown-linux-musl
          - x86_64-unknown-linux-musl
          - i686-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/cache@v5
        id: cache
        with:
          path: downloads/
          key: build-cache-${{ matrix.cross_host }}-${{ github.sha }}
          restore-keys: |
            build-cache-${{ matrix.cross_host }}-
      - name: compile
        env:
          CROSS_HOST: "${{ matrix.cross_host }}"
          USE_LIBRESSL: "${{ matrix.use_libressl }}"
        run: |
          if [ "${GITHUB_EVENT_NAME}" = release ]; then
            export ARIA2_VER="${GITHUB_REF#refs/*/}"
            echo "ARIA2_VER=${ARIA2_VER}" >> $GITHUB_ENV
          fi
          chmod +x "${GITHUB_WORKSPACE}/build.sh"
          "${GITHUB_WORKSPACE}/build.sh"
      - name: zip archiving
        env:
          CROSS_HOST: "${{ matrix.cross_host }}"
        run: |
          apt install -y zip
          ARCHIVE_NAME="aria2-${CROSS_HOST//-unknown/}_static.zip"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          zip -j9v "/tmp/${ARCHIVE_NAME}" "${GITHUB_WORKSPACE}"/aria2c*
        shell: bash
      - name: Upload to Prerelease
        uses: softprops/action-gh-release@v3
        with:
          files: /tmp/${{ env.ARCHIVE_NAME }}
          prerelease: true
          tag_name: v1.37.0
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  static-build-mingw:
    needs: create-prerelease
    runs-on: ubuntu-latest
    container: "ghcr.io/abcfy2/mingw-cross-toolchain-ubuntu:${{ matrix.cross_host }}"
    strategy:
      fail-fast: false
      matrix:
        cross_host:
          - x86_64-w64-mingw32
          - i686-w64-mingw32
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/cache@v5
        id: cache
        with:
          path: downloads/
          key: build-cache-${{ matrix.cross_host }}-${{ github.sha }}
          restore-keys: |
            build-cache-${{ matrix.cross_host }}-
      - name: compile
        env:
          CROSS_HOST: "${{ matrix.cross_host }}"
        run: |
          if [ "${GITHUB_EVENT_NAME}" = release ]; then
            export ARIA2_VER="${GITHUB_REF#refs/*/}"
            echo "ARIA2_VER=${ARIA2_VER}" >> $GITHUB_ENV
          fi
          chmod +x "${GITHUB_WORKSPACE}/build.sh"
          "${GITHUB_WORKSPACE}/build.sh"
      - name: zip archiving
        env:
          CROSS_HOST: "${{ matrix.cross_host }}"
        run: |
          apt install -y zip
          ARCHIVE_NAME="aria2-${CROSS_HOST//-unknown/}_static.zip"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          zip -j9v "/tmp/${ARCHIVE_NAME}" "${GITHUB_WORKSPACE}"/aria2c*
        shell: bash
      - name: Upload to Prerelease
        uses: softprops/action-gh-release@v3
        with:
          files: /tmp/${{ env.ARCHIVE_NAME }}
          prerelease: true
          tag_name: v1.37.0
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  finalize-release:
    name: Finalize Release
    needs: [static-build-linux, static-build-mingw]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Convert to Release
        run: |
          gh release edit v1.37.0 \
            --prerelease=false \
            --notes "Aria2 v1.37.0 - Custom build with enhanced patches

            ## Features
            - Unlock connection-per-server limit (unlimited connections)
            - Download retry on slow speed
            - HTTP 4xx error retry support
            - Windows daemon support
            - And more...

            ## Platforms
            - Linux: arm, armv7, aarch64, loongarch64, x86_64, i686
            - Windows: x86_64, i686

            Built with latest dependencies: OpenSSL, zlib-ng, c-ares, libssh2"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
