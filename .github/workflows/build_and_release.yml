name: "Build and Release"

on:
  push:
    branches:
      - "*"
    paths:
      - 'build.sh'
      - '.github/workflows/build_and_release.yml'
      - 'patch/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup-and-create-draft:
    name: Cleanup & Create Draft
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.set_time.outputs.build_time }}
      release_tag: ${{ steps.set_time.outputs.release_tag }}
      release_title: ${{ steps.set_time.outputs.release_title }}
      aria2_ref: ${{ steps.set_time.outputs.aria2_ref }}
      aria2_short_ref: ${{ steps.set_time.outputs.aria2_short_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check and cleanup previous runs
        run: |
          echo "🔍 Checking previous workflow runs..."
          RUNS=$(gh run list --workflow=build_and_release.yml --limit=5 --json databaseId,status,conclusion,createdAt --jq '.[] | select(.databaseId != ${{ github.run_id }})')
          echo "Found runs:"
          echo "$RUNS"

          for RUN_ID in $(echo "$RUNS" | jq -r '.databaseId'); do
            STATUS=$(echo "$RUNS" | jq -r "select(.databaseId == $RUN_ID) | .status")
            CONCLUSION=$(echo "$RUNS" | jq -r "select(.databaseId == $RUN_ID) | .conclusion")

            if [ "$STATUS" = "in_progress" ] || [ "$STATUS" = "queued" ] || [ "$STATUS" = "waiting" ]; then
              echo "⚠️ Stopping running workflow #${RUN_ID} (status: ${STATUS})..."
              gh run cancel $RUN_ID || true
              sleep 10
              # Try to delete, don't fail if it doesn't work
              if gh run delete $RUN_ID 2>/dev/null; then
                echo "✅ Stopped and deleted workflow #${RUN_ID}"
              else
                echo "⚠️ Could not delete workflow #${RUN_ID} yet (may still be processing), continuing..."
                sleep 5
                gh run delete $RUN_ID || true
              fi
            elif [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ] || [ "$CONCLUSION" = "timed_out" ]; then
              echo "🗑️ Deleting failed workflow #${RUN_ID} (conclusion: ${CONCLUSION})..."
              gh run delete $RUN_ID || true
              echo "✅ Deleted workflow #${RUN_ID}"
            else
              echo "ℹ️ Skipping workflow #${RUN_ID} (status: ${STATUS}, conclusion: ${CONCLUSION})"
            fi
          done
          echo "✅ Previous runs cleanup completed"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Set build time
        id: set_time
        run: |
          BUILD_DATE="$(date -u '+%Y-%m-%d')"
          ARIA2_REF="$(git ls-remote https://github.com/aria2/aria2 refs/heads/master | cut -f1)"
          if [ -z "${ARIA2_REF}" ]; then
            echo "Failed to resolve aria2 master ref"
            exit 1
          fi
          ARIA2_SHORT_REF="$(printf '%s' "${ARIA2_REF}" | cut -c1-12)"
          echo "build_time=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT
          echo "release_tag=aria2-master-$(date -u '+%Y%m%d')-${ARIA2_SHORT_REF}" >> $GITHUB_OUTPUT
          echo "release_title=Aria2 master ${BUILD_DATE} (${ARIA2_SHORT_REF})" >> $GITHUB_OUTPUT
          echo "aria2_ref=${ARIA2_REF}" >> $GITHUB_OUTPUT
          echo "aria2_short_ref=${ARIA2_SHORT_REF}" >> $GITHUB_OUTPUT

      - name: Cleanup old release and tag
        run: |
          RELEASE_TAG="${{ steps.set_time.outputs.release_tag }}"
          echo "🗑️ Cleaning up old release ${RELEASE_TAG}..."
          gh release delete "${RELEASE_TAG}" --cleanup-tag || true
          git tag -d "${RELEASE_TAG}" || true
          git push origin ":refs/tags/${RELEASE_TAG}" || true
          echo "✅ Old release cleanup completed"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Create and push tag
        run: |
          RELEASE_TAG="${{ steps.set_time.outputs.release_tag }}"
          RELEASE_TITLE="${{ steps.set_time.outputs.release_title }}"
          echo "🏷️ Creating tag ${RELEASE_TAG}..."
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "${RELEASE_TAG}" -m "${RELEASE_TITLE}"
          git push origin "${RELEASE_TAG}"
          echo "✅ Tag ${RELEASE_TAG} created and pushed"

          # Wait for tag to be visible on remote (max 60s, check every 5s)
          echo "⏳ Waiting for tag to be visible on remote..."
          TRIES=12
          SLEEP=5
          FOUND=0
          for i in $(seq 1 $TRIES); do
            if git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | grep -q "refs/tags/${RELEASE_TAG}"; then
              echo "✅ Tag ${RELEASE_TAG} is now visible on remote"
              FOUND=1
              break
            fi
            echo "⏳ Attempt $i/$TRIES: Tag not yet visible, waiting ${SLEEP}s..."
            sleep $SLEEP
          done

          if [ "$FOUND" -ne 1 ]; then
            echo "❌ Tag ${RELEASE_TAG} not visible on remote after timeout; aborting release creation."
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Create Draft Release
        run: |
          RELEASE_TAG="${{ steps.set_time.outputs.release_tag }}"
          RELEASE_TITLE="${{ steps.set_time.outputs.release_title }}"
          echo "📝 Creating draft release ${RELEASE_TAG}..."
          gh release create "${RELEASE_TAG}" \
            --draft \
            -t "${RELEASE_TITLE}" \
            --notes "## ${RELEASE_TITLE}

            Custom build from aria2 master with enhanced patches.

            **Build Time:** ${{ steps.set_time.outputs.build_time }}
            **aria2 master:** https://github.com/aria2/aria2/commit/${{ steps.set_time.outputs.aria2_ref }}

            ---

            ## Features

            - Unlock connection-per-server limit (unlimited connections)
            - Download retry on slow speed
            - HTTP 4xx error retry support
            - Windows daemon support
            - And more...

            ---

            ## Platforms

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | ARM (armv6) | [aria2-arm-unknown-linux-musl_static.zip](https://github.com/lisrain/aria2_build_new/releases/download/${RELEASE_TAG}/aria2-arm-unknown-linux-musl_static.zip) |
            | Linux | ARMv7 | [aria2-armv7-unknown-linux-musleabihf_static.zip](https://github.com/lisrain/aria2_build_new/releases/download/${RELEASE_TAG}/aria2-armv7-unknown-linux-musleabihf_static.zip) |
            | Linux | AArch64 | [aria2-aarch64-unknown-linux-musl_static.zip](https://github.com/lisrain/aria2_build_new/releases/download/${RELEASE_TAG}/aria2-aarch64-unknown-linux-musl_static.zip) |
            | Linux | LoongArch64 | [aria2-loongarch64-unknown-linux-musl_static.zip](https://github.com/lisrain/aria2_build_new/releases/download/${RELEASE_TAG}/aria2-loongarch64-unknown-linux-musl_static.zip) |
            | Linux | x86_64 | [aria2-x86_64-unknown-linux-musl_static.zip](https://github.com/lisrain/aria2_build_new/releases/download/${RELEASE_TAG}/aria2-x86_64-unknown-linux-musl_static.zip) |
            | Linux | i686 | [aria2-i686-unknown-linux-musl_static.zip](https://github.com/lisrain/aria2_build_new/releases/download/${RELEASE_TAG}/aria2-i686-unknown-linux-musl_static.zip) |
            | Windows | x86_64 | [aria2-x86_64-w64-mingw32_static.zip](https://github.com/lisrain/aria2_build_new/releases/download/${RELEASE_TAG}/aria2-x86_64-w64-mingw32_static.zip) |
            | Windows | i686 | [aria2-i686-w64-mingw32_static.zip](https://github.com/lisrain/aria2_build_new/releases/download/${RELEASE_TAG}/aria2-i686-w64-mingw32_static.zip) |

            ---

            ## Dependencies

            Linux builds use the existing static dependency set. Windows builds mirror upstream mingw-config: WinTLS, zlib, c-ares, libssh2, sqlite3, expat, and gmp.
            "
          echo "✅ Draft release created"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  static-build-linux:
    needs: cleanup-and-create-draft
    runs-on: ubuntu-latest
    container: "ghcr.io/abcfy2/clang-cross-toolchain-ubuntu:${{ matrix.cross_host }}"
    strategy:
      fail-fast: false
      matrix:
        cross_host:
          - arm-unknown-linux-musleabi
          - armv7-unknown-linux-musleabihf
          - aarch64-unknown-linux-musl
          - loongarch64-unknown-linux-musl
          - x86_64-unknown-linux-musl
          - i686-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/cache@v5
        id: cache
        with:
          path: downloads/
          key: build-cache-${{ matrix.cross_host }}-${{ hashFiles('build.sh') }}
          restore-keys: |
            build-cache-${{ matrix.cross_host }}-
      - name: compile
        env:
          CROSS_HOST: "${{ matrix.cross_host }}"
          ARIA2_REF: "${{ needs.cleanup-and-create-draft.outputs.aria2_ref }}"
        run: |
          chmod +x "${GITHUB_WORKSPACE}/build.sh"
          "${GITHUB_WORKSPACE}/build.sh"
      - name: zip archiving
        env:
          CROSS_HOST: "${{ matrix.cross_host }}"
        run: |
          apt install -y zip
          ARCHIVE_NAME="aria2-${CROSS_HOST//-unknown/}_static.zip"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          zip -j9v "/tmp/${ARCHIVE_NAME}" "${GITHUB_WORKSPACE}"/aria2c*
        shell: bash
      - name: Upload to Draft
        uses: softprops/action-gh-release@v3
        with:
          files: /tmp/${{ env.ARCHIVE_NAME }}
          draft: true
          tag_name: ${{ needs.cleanup-and-create-draft.outputs.release_tag }}
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  static-build-mingw:
    needs: cleanup-and-create-draft
    runs-on: ubuntu-latest
    container: "ghcr.io/abcfy2/mingw-cross-toolchain-ubuntu:${{ matrix.cross_host }}"
    strategy:
      fail-fast: false
      matrix:
        cross_host:
          - x86_64-w64-mingw32
          - i686-w64-mingw32
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/cache@v5
        id: cache
        with:
          path: downloads/
          key: build-cache-${{ matrix.cross_host }}-${{ hashFiles('build.sh') }}
          restore-keys: |
            build-cache-${{ matrix.cross_host }}-
      - name: compile
        env:
          CROSS_HOST: "${{ matrix.cross_host }}"
          ARIA2_REF: "${{ needs.cleanup-and-create-draft.outputs.aria2_ref }}"
        run: |
          chmod +x "${GITHUB_WORKSPACE}/build.sh"
          "${GITHUB_WORKSPACE}/build.sh"
      - name: zip archiving
        env:
          CROSS_HOST: "${{ matrix.cross_host }}"
        run: |
          apt install -y zip
          ARCHIVE_NAME="aria2-${CROSS_HOST//-unknown/}_static.zip"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          zip -j9v "/tmp/${ARCHIVE_NAME}" "${GITHUB_WORKSPACE}"/aria2c*
        shell: bash
      - name: Upload to Draft
        uses: softprops/action-gh-release@v3
        with:
          files: /tmp/${{ env.ARCHIVE_NAME }}
          draft: true
          tag_name: ${{ needs.cleanup-and-create-draft.outputs.release_tag }}
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  windows-https-smoke-test:
    name: Windows HTTPS Smoke Test
    needs: [cleanup-and-create-draft, static-build-mingw]
    runs-on: windows-latest
    steps:
      - name: Download Windows release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ needs.cleanup-and-create-draft.outputs.release_tag }}
        run: |
          New-Item -ItemType Directory -Force smoke | Out-Null
          $assets = @(
            "aria2-x86_64-w64-mingw32_static.zip",
            "aria2-i686-w64-mingw32_static.zip"
          )
          foreach ($asset in $assets) {
            $downloaded = $false
            for ($i = 1; $i -le 12; $i++) {
              gh release download $env:RELEASE_TAG -p $asset -D smoke
              if ($LASTEXITCODE -eq 0 -and (Test-Path "smoke\$asset")) {
                $downloaded = $true
                break
              }
              Write-Host "Waiting for $asset to be available ($i/12)..."
              Start-Sleep -Seconds 10
            }
            if (-not $downloaded) {
              Write-Error "Failed to download $asset from release $env:RELEASE_TAG"
              exit 1
            }
          }

      - name: Verify HTTPS certificate handling
        shell: pwsh
        run: |
          $archives = Get-ChildItem smoke -Filter "aria2-*-w64-mingw32_static.zip"
          foreach ($archive in $archives) {
            $outDir = Join-Path "smoke" $archive.BaseName
            Expand-Archive -Force $archive.FullName $outDir
            $aria2 = Get-ChildItem -Recurse $outDir -Filter "aria2c.exe" | Select-Object -First 1
            if (-not $aria2) {
              Write-Error "aria2c.exe not found in $($archive.Name)"
              exit 1
            }
            & $aria2.FullName --version
            & $aria2.FullName -t 10 --console-log-level=debug --http-accept-gzip=true "https://github.com/" -d $env:TEMP -o "aria2-https-smoke-test-$($archive.BaseName).html"
            if ($LASTEXITCODE -ne 0) {
              Write-Error "HTTPS smoke test failed for $($archive.Name)"
              exit $LASTEXITCODE
            }
          }

  publish-release:
    name: Publish Release
    needs: [cleanup-and-create-draft, static-build-linux, static-build-mingw, windows-https-smoke-test]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Publish Draft Release
        run: |
          gh release edit "${{ needs.cleanup-and-create-draft.outputs.release_tag }}" \
            --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
